<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./static/icon.jpg" />
    <title>Japanese Sensei</title>
    <style>
      :root {
        --primary: #2563eb;
        --primary-dark: #1e40af;
        --success: #16a34a;
        --bg: rgba(255, 255, 255, 0.78);
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background-image: url("./static/background.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          sans-serif;
        color: var(--text);
      }
      .page {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        padding: 24px;
        min-height: 100vh;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.9),
          rgba(255, 255, 255, 0.6)
        );
      }
      .card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 18px;
        backdrop-filter: blur(4px);
      }
      .title {
        margin: 0 0 6px 0;
        font-size: 20px;
        font-weight: 700;
      }
      .subtle {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 10px 0 6px 0;
      }
      input[type="text"],
      input[type="number"],
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        background: white;
      }
      textarea[readonly],
      input[readonly] {
        background: #f8fafc;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
      }
      button {
        padding: 10px 14px;
        background: var(--primary);
        color: white;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        background: var(--primary-dark);
      }
      button[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .progress {
        margin-top: 12px;
      }
      .progressbar {
        width: 100%;
        height: 12px;
        background: #eef2ff;
        border-radius: 999px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .progressbar > div {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--primary), #22c55e);
        transition: width 200ms ease;
      }
      .progressline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }
      .steps {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .chip {
        border: 1px solid var(--border);
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        background: white;
      }
      .chip.active {
        border-color: var(--primary);
        color: var(--primary-dark);
        background: #eef2ff;
        font-weight: 600;
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
        margin-left: 6px;
      }
      canvas {
        width: 100%;
        height: auto;
        border: 2px solid #0f172a;
        border-radius: 8px;
        cursor: crosshair;
        background: white;
      }
      .spacer { height: 6px; }
      .row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .small { font-size: 12px; color: var(--muted); }
    </style>
    <!-- React via CDN (primary: unpkg, with runtime fallbacks) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script>
      // Fallback loader if CDNs are blocked
      (function () {
        function add(src, cb) {
          var s = document.createElement('script');
          s.src = src; s.async = true; s.onload = cb; document.head.appendChild(s);
        }
        function ensureReact(cb) {
          if (window.React && window.ReactDOM) return cb();
          add('https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js', function () {
            add('https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js', cb);
          });
        }
        function ensureBabel(cb) {
          if (window.Babel) return cb();
          add('https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js', cb);
        }
        setTimeout(function(){ ensureReact(function(){ ensureBabel(function(){}); }); }, 200);
      })();
    </script>
  </head>
  <body>
    <!-- Pre-rendered skeleton so something is visible even before React mounts -->
    <div id="root">
      <div class="page">
        <div>
          <div class="card">
            <div class="title">Quiz Options</div>
            <div class="subtle">Loading UI… If this persists, scripts may be blocked.</div>
            <label>Question</label>
            <input id="question" type="text" placeholder="Enter your question..." />
            <div class="row">
              <div>
                <label>Option 1</label>
                <input id="option1" type="text" placeholder="Option 1..." />
              </div>
              <div>
                <label>Option 2</label>
                <input id="option2" type="text" placeholder="Option 2..." />
              </div>
            </div>
            <div class="row">
              <div>
                <label>Option 3</label>
                <input id="option3" type="text" placeholder="Option 3..." />
              </div>
              <div>
                <label>Option 4</label>
                <input id="option4" type="text" placeholder="Option 4..." />
              </div>
            </div>
            <div class="actions">
              <button id="submitBtn" disabled>Submit</button>
              <span id="stateText1" class="small">Initializing…</span>
            </div>
            <label>Answer</label>
            <input id="answer" type="text" readOnly value="" />
            <label>Explanation</label>
            <textarea id="explanation" rows="5" readOnly></textarea>
          </div>
          <div class="progress">
            <div class="progressbar"><div id="progress-bar" style="width: 0%"></div></div>
            <div class="progressline">
              <div id="phase-label">Idle</div>
              <div id="progress-percent">0%</div>
            </div>
            <div class="steps">
              <span id="chip-idle" class="chip active">Idle</span>
              <span id="chip-answering" class="chip">Answering</span>
              <span id="chip-explaining" class="chip">Explaining</span>
              <span id="chip-done" class="chip">Done</span>
            </div>
          </div>
        </div>
        <div>
          <div class="card">
            <div class="title">Or Upload an Image</div>
            <div class="subtle">Draw a rectangle around the question and options.</div>
            <div class="row-3">
              <div>
                <label>Options Count</label>
                <input id="numOptions" type="number" min="2" max="4" value="4" />
              </div>
              <div style="grid-column: span 2">
                <label>Upload Image</label>
                <input id="imageUpload" type="file" accept="image/*" />
              </div>
            </div>
            <div class="spacer"></div>
            <canvas id="imageCanvas"></canvas>
            <div class="actions">
              <button id="extractButton" disabled>Extract Text</button>
              <span id="stateText2" class="small">Initializing…</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      // Show an error banner if CDNs are blocked and React doesn't mount soon.
      (function () {
        function showBanner(msg) {
          var b = document.createElement('div');
          b.style.position = 'fixed';
          b.style.left = '0';
          b.style.right = '0';
          b.style.bottom = '0';
          b.style.padding = '10px 14px';
          b.style.background = '#fee2e2';
          b.style.color = '#991b1b';
          b.style.borderTop = '1px solid #fecaca';
          b.style.font = '12px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif';
          b.textContent = msg;
          document.body.appendChild(b);
        }
        setTimeout(function () {
          if (!window.React || !window.ReactDOM) {
            showBanner('React libraries failed to load. Check your internet or CDN blocking.');
            return;
          }
          var root = document.getElementById('root');
          if (!root || root.childNodes.length === 0) {
            showBanner('UI did not mount. Please hard refresh (Ctrl+Shift+R).');
          }
        }, 1500);
      })();
    </script>
    <script>
      // Vanilla JS fallback if React fails to mount
      (function () {
        function initFallback() {
          var q = document.getElementById('question');
          if (!q) return; // DOM not ready
          var submitBtn = document.getElementById('submitBtn');
          var ans = document.getElementById('answer');
          var exp = document.getElementById('explanation');
          var pbar = document.getElementById('progress-bar');
          var opt1 = document.getElementById('option1');
          var opt2 = document.getElementById('option2');
          var opt3 = document.getElementById('option3');
          var opt4 = document.getElementById('option4');

          // Enable buttons now that fallback is active
          submitBtn.removeAttribute('disabled');
          var extractBtn = document.getElementById('extractButton');
          extractBtn.removeAttribute('disabled');
          var st1 = document.getElementById('stateText1');
          var st2 = document.getElementById('stateText2');
          if (st1) st1.textContent = 'Ready';
          if (st2) st2.textContent = 'Ready';

          // WebSocket for progress
          try {
            var proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
            var socket = new WebSocket(proto + '://' + window.location.host + '/ws');
            // Phase helpers
            var phaseLabel = document.getElementById('phase-label');
            var percentLabel = document.getElementById('progress-percent');
            var chips = {
              Idle: document.getElementById('chip-idle'),
              Answering: document.getElementById('chip-answering'),
              Explaining: document.getElementById('chip-explaining'),
              Done: document.getElementById('chip-done')
            };
            function setPhaseByProgress(prog){
              var phase = 'Idle';
              if (prog >= 10 && prog < 40) phase = 'Answering';
              else if (prog >= 40 && prog < 80) phase = 'Explaining';
              else if (prog >= 80) phase = 'Done';
              if (phaseLabel) phaseLabel.textContent = phase;
              if (percentLabel) percentLabel.textContent = Math.min(100, Math.round((prog/80)*100)) + '%';
              if (chips.Idle){
                Object.keys(chips).forEach(function(k){ chips[k].classList.remove('active'); });
                chips[phase].classList.add('active');
              }
            }
            socket.onmessage = function (event) {
              try {
                var data = JSON.parse(event.data);
                if (typeof data.progress === 'number') {
                  pbar.style.width = Math.min(100, Math.round((data.progress / 80) * 100)) + '%';
                  setPhaseByProgress(data.progress);
                }
                if (data.reset) {
                  ans.value = '';
                  exp.value = '';
                  pbar.style.width = '0%';
                  setPhaseByProgress(0);
                }
              } catch (e) {}
            };
          } catch (e) {}

          async function retrieveExplanation(answerStr) {
            var body = {
              question: q.value,
              option1: opt1.value,
              option2: opt2.value,
              option3: opt3.value,
              option4: opt4.value,
              answer: answerStr,
            };
            const r = await fetch('/retrieve_explanation', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            const data = await r.json();
            exp.value = typeof data === 'string' ? data : JSON.stringify(data);
          }

          submitBtn.addEventListener('click', async function () {
            submitBtn.setAttribute('disabled', 'disabled');
            if (st1) st1.textContent = 'Processing…';
            try {
              const r = await fetch('/reterieve_answer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  question: q.value,
                  option1: opt1.value,
                  option2: opt2.value,
                  option3: opt3.value,
                  option4: opt4.value,
                }),
              });
              const data = await r.json();
              const asString = typeof data === 'string' ? data : JSON.stringify(data);
              ans.value = asString;
              await retrieveExplanation(asString);
            } catch (e) {
              console.error(e);
              alert('Error submitting.');
            } finally {
              submitBtn.removeAttribute('disabled');
              if (st1) st1.textContent = 'Ready';
            }
          });

          // Image selection + OCR extract
          var canvas = document.getElementById('imageCanvas');
          var ctx = canvas.getContext('2d');
          var img = null;
          var isDrawing = false;
          var startX = 0, startY = 0, endX = 0, endY = 0;
          document.getElementById('imageUpload').addEventListener('change', function (e) {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
              img = new Image();
              img.onload = function () {
                canvas.width = img.width; canvas.height = img.height; ctx.drawImage(img, 0, 0);
              };
              img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
          });
          canvas.addEventListener('mousedown', function (e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            startX = (e.clientX - rect.left) * (canvas.width / rect.width);
            startY = (e.clientY - rect.top) * (canvas.height / rect.height);
          });
          canvas.addEventListener('mouseup', function () { isDrawing = false; });
          canvas.addEventListener('mousemove', function (e) {
            if (!isDrawing || !img) return;
            const rect = canvas.getBoundingClientRect();
            endX = (e.clientX - rect.left) * (canvas.width / rect.width);
            endY = (e.clientY - rect.top) * (canvas.height / rect.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
            ctx.strokeStyle = 'red'; ctx.lineWidth = 3;
            ctx.strokeRect(startX, startY, endX - startX, endY - startY);
          });
          document.getElementById('extractButton').addEventListener('click', async function () {
            if (st2) st2.textContent = 'Processing…';
            const numOptions = document.getElementById('numOptions').value || 4;
            const fd = new FormData();
            fd.append('image_data', canvas.toDataURL());
            fd.append('x1', Math.round(startX));
            fd.append('y1', Math.round(startY));
            fd.append('x2', Math.round(endX));
            fd.append('y2', Math.round(endY));
            fd.append('num_options', numOptions);
            try {
              const res = await fetch('/extract-text/', { method: 'POST', body: fd });
              const data = await res.json();
              document.getElementById('question').value = data.suggested_question || '';
              (data.suggested_options || []).forEach((opt, idx) => {
                var el = document.getElementById('option' + (idx + 1));
                if (el) el.value = opt;
              });
              alert('Suggested question and options filled.');
            } catch (e) {
              console.error('Error extracting text:', e);
              alert('Error extracting text');
            } finally { if (st2) st2.textContent = 'Ready'; }
          });
        }

        // Initialize fallback if React hasn't mounted shortly after load
        window.addEventListener('load', function(){
          setTimeout(function(){
            if (!window.React || !window.ReactDOM || !document.querySelector('[data-reactroot]')) {
              initFallback();
            }
          }, 1200);
        });
      })();
    </script>
    <script type="text/babel" data-presets="env,react">
      const { useEffect, useRef, useState } = React;

      function Progress({ progress, phase }) {
        // Backend typically reaches ~80; normalize visually to 100
        const normalized = Math.min(100, Math.max(0, Math.round((progress / 80) * 100)));
        const steps = [
          { key: 'idle', label: 'Idle' },
          { key: 'answer', label: 'Answering' },
          { key: 'explain', label: 'Explaining' },
          { key: 'done', label: 'Done' },
        ];
        return (
          <div className="progress">
            <div className="progressbar"><div style={{ width: `${normalized}%` }} /></div>
            <div className="progressline">
              <div>{phase}</div>
              <div>{normalized}%</div>
            </div>
            <div className="steps">
              {steps.map((s) => (
                <span key={s.key} className={['chip', phase === s.label ? 'active' : ''].join(' ')}>{s.label}</span>
              ))}
            </div>
          </div>
        );
      }

      function QuizForm({ onSubmit, loading, answer, explanation, setField, fields }) {
        const [local, setLocal] = useState(fields);
        React.useEffect(() => setLocal(fields), [fields]);

        const update = (key, val) => {
          setLocal((prev) => ({ ...prev, [key]: val }));
          setField(key, val);
        };

        return (
          <div className="card">
            <div className="title">Quiz Options</div>
            <div className="subtle">Enter your question and up to 4 options.</div>

            <label>Question</label>
            <input type="text" value={local.question} onChange={(e) => update('question', e.target.value)} placeholder="Enter your question..." />

            <div className="row">
              <div>
                <label>Option 1</label>
                <input type="text" value={local.option1} onChange={(e) => update('option1', e.target.value)} placeholder="Option 1..." />
              </div>
              <div>
                <label>Option 2</label>
                <input type="text" value={local.option2} onChange={(e) => update('option2', e.target.value)} placeholder="Option 2..." />
              </div>
            </div>
            <div className="row">
              <div>
                <label>Option 3</label>
                <input type="text" value={local.option3} onChange={(e) => update('option3', e.target.value)} placeholder="Option 3..." />
              </div>
              <div>
                <label>Option 4</label>
                <input type="text" value={local.option4} onChange={(e) => update('option4', e.target.value)} placeholder="Option 4..." />
              </div>
            </div>

            <div className="actions">
              <button disabled={loading} onClick={onSubmit}>{loading ? 'Thinking…' : 'Submit'}</button>
              <span className="small">The model will pick an answer and explain it.</span>
            </div>

            <label>Answer</label>
            <input type="text" readOnly value={answer} />
            <label>Explanation</label>
            <textarea rows="5" readOnly value={explanation} />
          </div>
        );
      }

      function ImageTextExtractor({ onFillFromImage }) {
        const [numOptions, setNumOptions] = useState(4);
        const [imageData, setImageData] = useState(null);
        const canvasRef = useRef(null);
        const imgRef = useRef(null);
        const drawing = useRef({ active: false, startX: 0, startY: 0, endX: 0, endY: 0 });

        React.useEffect(() => {
          if (!imageData) return;
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');
          const img = new Image();
          img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            imgRef.current = img;
          };
          img.src = imageData;
        }, [imageData]);

        const onMouseDown = (e) => {
          const canvas = canvasRef.current;
          const rect = canvas.getBoundingClientRect();
          drawing.current.active = true;
          drawing.current.startX = (e.clientX - rect.left) * (canvas.width / rect.width);
          drawing.current.startY = (e.clientY - rect.top) * (canvas.height / rect.height);
        };
        const onMouseUp = () => { drawing.current.active = false; };
        const onMouseMove = (e) => {
          if (!drawing.current.active || !imgRef.current) return;
          const canvas = canvasRef.current;
          const rect = canvas.getBoundingClientRect();
          const ctx = canvas.getContext('2d');
          drawing.current.endX = (e.clientX - rect.left) * (canvas.width / rect.width);
          drawing.current.endY = (e.clientY - rect.top) * (canvas.height / rect.height);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(imgRef.current, 0, 0);
          ctx.strokeStyle = 'red';
          ctx.lineWidth = 3;
          ctx.strokeRect(
            drawing.current.startX,
            drawing.current.startY,
            drawing.current.endX - drawing.current.startX,
            drawing.current.endY - drawing.current.startY
          );
        };

        const handleExtract = async () => {
          const canvas = canvasRef.current;
          if (!canvas || !imageData) return;
          const { startX, startY, endX, endY } = drawing.current;
          const formData = new FormData();
          formData.append('image_data', canvas.toDataURL());
          formData.append('x1', Math.round(startX));
          formData.append('y1', Math.round(startY));
          formData.append('x2', Math.round(endX));
          formData.append('y2', Math.round(endY));
          formData.append('num_options', numOptions);

          try {
            const res = await fetch('/extract-text/', { method: 'POST', body: formData });
            const data = await res.json();
            onFillFromImage({
              question: data.suggested_question || '',
              option1: data.suggested_options?.[0] || '',
              option2: data.suggested_options?.[1] || '',
              option3: data.suggested_options?.[2] || '',
              option4: data.suggested_options?.[3] || '',
            });
            alert('Suggested question and options filled.');
          } catch (err) {
            console.error('Error extracting text:', err);
            alert('Error extracting text.');
          }
        };

        return (
          <div className="card">
            <div className="title">Or Upload an Image</div>
            <div className="subtle">Draw a rectangle around the question and options.</div>
            <div className="row-3">
              <div>
                <label>Options Count</label>
                <input type="number" min={2} max={4} value={numOptions} onChange={(e) => setNumOptions(parseInt(e.target.value || '4', 10))} />
              </div>
              <div style={{ gridColumn: 'span 2' }}>
                <label>Upload Image</label>
                <input type="file" accept="image/*" onChange={(e) => {
                  const f = e.target.files?.[0];
                  if (!f) return;
                  const reader = new FileReader();
                  reader.onload = (ev) => setImageData(ev.target.result);
                  reader.readAsDataURL(f);
                }} />
              </div>
            </div>
            <div className="spacer" />
            <canvas
              ref={canvasRef}
              onMouseDown={onMouseDown}
              onMouseUp={onMouseUp}
              onMouseMove={onMouseMove}
            />
            <div className="actions">
              <button onClick={handleExtract}>Extract Text</button>
              <span className="small">Tip: Click, drag and release to select.</span>
            </div>
          </div>
        );
      }

      function App() {
        const [fields, setFields] = useState({ question: '', option1: '', option2: '', option3: '', option4: '' });
        const [answer, setAnswer] = useState('');
        const [explanation, setExplanation] = useState('');
        const [loading, setLoading] = useState(false);
        const [progress, setProgress] = useState(0);
        const [phase, setPhase] = useState('Idle');

        const setField = (key, val) => setFields((prev) => ({ ...prev, [key]: val }));
        const onFillFromImage = (vals) => setFields((prev) => ({ ...prev, ...vals }));

        // WebSocket progress handling
        React.useEffect(() => {
          const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
          const ws = new WebSocket(`${proto}://${window.location.host}/ws`);
          ws.onmessage = (ev) => {
            try {
              const data = JSON.parse(ev.data);
              if (typeof data.progress === 'number') {
                setProgress(data.progress);
                // Phase heuristic aligned to backend increments (~80 total)
                if (data.progress < 10) setPhase('Idle');
                else if (data.progress < 40) setPhase('Answering');
                else if (data.progress < 80) setPhase('Explaining');
                else setPhase('Done');
              }
              if (data.reset) {
                setAnswer('');
                setExplanation('');
                setProgress(0);
                setPhase('Idle');
              }
            } catch (_) {}
          };
          return () => ws.close();
        }, []);

        const handleSubmit = async () => {
          setLoading(true);
          setAnswer('');
          setExplanation('');
          setPhase('Answering');
          try {
            const res = await fetch('/reterieve_answer', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                question: fields.question,
                option1: fields.option1,
                option2: fields.option2,
                option3: fields.option3,
                option4: fields.option4,
              }),
            });
            const data = await res.json();
            const asString = typeof data === 'string' ? data : (data?.answer || JSON.stringify(data));
            setAnswer(asString);

            setPhase('Explaining');
            const resExp = await fetch('/retrieve_explanation', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ...fields, answer: asString }),
            });
            const exp = await resExp.json();
            const expString = typeof exp === 'string' ? exp : JSON.stringify(exp);
            setExplanation(expString);
            setPhase('Done');
          } catch (err) {
            console.error('Submit error:', err);
            alert('There was an error. Check the backend logs.');
            setPhase('Idle');
          } finally {
            setLoading(false);
          }
        };

        return (
          <div className="page">
            <div>
              <QuizForm
                onSubmit={handleSubmit}
                loading={loading}
                answer={answer}
                explanation={explanation}
                fields={fields}
                setField={setField}
              />
              <Progress progress={progress} phase={phase} />
            </div>
            <div>
              <ImageTextExtractor onFillFromImage={onFillFromImage} />
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
