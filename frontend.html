<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./static/icon.jpg" />
    <title>Japanese Sensei</title>
    <style>
      :root {
        --primary: #2563eb;
        --primary-dark: #1e40af;
        --success: #16a34a;
        --bg: rgba(255, 255, 255, 0.78);
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background-image: url("./static/background.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          sans-serif;
        color: var(--text);
      }
      .page {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        padding: 24px;
        min-height: 100vh;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.9),
          rgba(255, 255, 255, 0.6)
        );
      }
      .card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 18px;
        backdrop-filter: blur(4px);
      }
      .title {
        margin: 0 0 6px 0;
        font-size: 20px;
        font-weight: 700;
      }
      .subtle {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 10px 0 6px 0;
      }
      input[type="text"],
      input[type="number"],
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        background: white;
      }
      textarea[readonly],
      input[readonly] {
        background: #f8fafc;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
      }
      button {
        padding: 10px 14px;
        background: var(--primary);
        color: white;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        background: var(--primary-dark);
      }
      button[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .progress {
        margin-top: 12px;
      }
      .progressbar {
        width: 100%;
        height: 12px;
        background: #eef2ff;
        border-radius: 999px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .progressbar > div {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--primary), #22c55e);
        transition: width 200ms ease;
      }
      .progressline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }
      .steps {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .chip {
        border: 1px solid var(--border);
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        background: white;
      }
      .chip.active {
        border-color: var(--primary);
        color: var(--primary-dark);
        background: #eef2ff;
        font-weight: 600;
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
        margin-left: 6px;
      }
      canvas {
        width: 100%;
        height: auto;
        border: 2px solid #0f172a;
        border-radius: 8px;
        cursor: crosshair;
        background: white;
      }
      .spacer { height: 6px; }
      .row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .small { font-size: 12px; color: var(--muted); }
    </style>
    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useRef, useState } = React;

      function Progress({ progress, phase }) {
        // Normalize backend's ~0..80 to 0..100 for UX
        const normalized = Math.min(100, Math.round((progress / 80) * 100));
        const steps = [
          { key: 'idle', label: 'Idle' },
          { key: 'answer', label: 'Answering' },
          { key: 'explain', label: 'Explaining' },
          { key: 'done', label: 'Done' },
        ];
        return (
          <div className="progress">
            <div className="progressbar"><div style={{ width: `${normalized}%` }} /></div>
            <div className="progressline">
              <div>{phase}</div>
              <div>{normalized}%</div>
            </div>
            <div className="steps">
              {steps.map((s) => (
                <span key={s.key} className={['chip', phase === s.label ? 'active' : ''].join(' ')}>{s.label}</span>
              ))}
            </div>
          </div>
        );
      }

      function QuizForm({ onSubmit, loading, answer, explanation, setField, fields }) {
        const [local, setLocal] = useState(fields);
        React.useEffect(() => setLocal(fields), [fields]);

        const update = (key, val) => {
          setLocal((prev) => ({ ...prev, [key]: val }));
          setField(key, val);
        };

        return (
          <div className="card">
            <div className="title">Quiz Options</div>
            <div className="subtle">Enter your question and up to 4 options.</div>

            <label>Question</label>
            <input type="text" value={local.question} onChange={(e) => update('question', e.target.value)} placeholder="Enter your question..." />

            <div className="row">
              <div>
                <label>Option 1</label>
                <input type="text" value={local.option1} onChange={(e) => update('option1', e.target.value)} placeholder="Option 1..." />
              </div>
              <div>
                <label>Option 2</label>
                <input type="text" value={local.option2} onChange={(e) => update('option2', e.target.value)} placeholder="Option 2..." />
              </div>
            </div>
            <div className="row">
              <div>
                <label>Option 3</label>
                <input type="text" value={local.option3} onChange={(e) => update('option3', e.target.value)} placeholder="Option 3..." />
              </div>
              <div>
                <label>Option 4</label>
                <input type="text" value={local.option4} onChange={(e) => update('option4', e.target.value)} placeholder="Option 4..." />
              </div>
            </div>

            <div className="actions">
              <button disabled={loading} onClick={onSubmit}>{loading ? 'Thinking…' : 'Submit'}</button>
              <span className="small">The model will pick an answer and explain it.</span>
            </div>

            <label>Answer</label>
            <input type="text" readOnly value={answer} />
            <label>Explanation</label>
            <textarea rows="5" readOnly value={explanation} />
          </div>
        );
      }

      function ImageTextExtractor({ onFillFromImage }) {
        const [numOptions, setNumOptions] = useState(4);
        const [imageData, setImageData] = useState(null);
        const canvasRef = useRef(null);
        const imgRef = useRef(null);
        const drawing = useRef({ active: false, startX: 0, startY: 0, endX: 0, endY: 0 });

        React.useEffect(() => {
          if (!imageData) return;
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');
          const img = new Image();
          img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            imgRef.current = img;
          };
          img.src = imageData;
        }, [imageData]);

        const onMouseDown = (e) => {
          const canvas = canvasRef.current;
          const rect = canvas.getBoundingClientRect();
          drawing.current.active = true;
          drawing.current.startX = (e.clientX - rect.left) * (canvas.width / rect.width);
          drawing.current.startY = (e.clientY - rect.top) * (canvas.height / rect.height);
        };
        const onMouseUp = () => { drawing.current.active = false; };
        const onMouseMove = (e) => {
          if (!drawing.current.active || !imgRef.current) return;
          const canvas = canvasRef.current;
          const rect = canvas.getBoundingClientRect();
          const ctx = canvas.getContext('2d');
          drawing.current.endX = (e.clientX - rect.left) * (canvas.width / rect.width);
          drawing.current.endY = (e.clientY - rect.top) * (canvas.height / rect.height);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(imgRef.current, 0, 0);
          ctx.strokeStyle = 'red';
          ctx.lineWidth = 3;
          ctx.strokeRect(
            drawing.current.startX,
            drawing.current.startY,
            drawing.current.endX - drawing.current.startX,
            drawing.current.endY - drawing.current.startY
          );
        };

        const handleExtract = async () => {
          const canvas = canvasRef.current;
          if (!canvas || !imageData) return;
          const { startX, startY, endX, endY } = drawing.current;
          const formData = new FormData();
          formData.append('image_data', canvas.toDataURL());
          formData.append('x1', Math.round(startX));
          formData.append('y1', Math.round(startY));
          formData.append('x2', Math.round(endX));
          formData.append('y2', Math.round(endY));
          formData.append('num_options', numOptions);

          try {
            const res = await fetch('/extract-text/', { method: 'POST', body: formData });
            const data = await res.json();
            onFillFromImage({
              question: data.suggested_question || '',
              option1: data.suggested_options?.[0] || '',
              option2: data.suggested_options?.[1] || '',
              option3: data.suggested_options?.[2] || '',
              option4: data.suggested_options?.[3] || '',
            });
            alert('Suggested question and options filled.');
          } catch (err) {
            console.error('Error extracting text:', err);
            alert('Error extracting text.');
          }
        };

        return (
          <div className="card">
            <div className="title">Or Upload an Image</div>
            <div className="subtle">Draw a rectangle around the question and options.</div>
            <div className="row-3">
              <div>
                <label>Options Count</label>
                <input type="number" min={2} max={4} value={numOptions} onChange={(e) => setNumOptions(parseInt(e.target.value || '4', 10))} />
              </div>
              <div style={{ gridColumn: 'span 2' }}>
                <label>Upload Image</label>
                <input type="file" accept="image/*" onChange={(e) => {
                  const f = e.target.files?.[0];
                  if (!f) return;
                  const reader = new FileReader();
                  reader.onload = (ev) => setImageData(ev.target.result);
                  reader.readAsDataURL(f);
                }} />
              </div>
            </div>
            <div className="spacer" />
            <canvas
              ref={canvasRef}
              onMouseDown={onMouseDown}
              onMouseUp={onMouseUp}
              onMouseMove={onMouseMove}
            />
            <div className="actions">
              <button onClick={handleExtract}>Extract Text</button>
              <span className="small">Tip: Click, drag and release to select.</span>
            </div>
          </div>
        );
      }

      function App() {
        const [fields, setFields] = useState({ question: '', option1: '', option2: '', option3: '', option4: '' });
        const [answer, setAnswer] = useState('');
        const [explanation, setExplanation] = useState('');
        const [loading, setLoading] = useState(false);
        const [progress, setProgress] = useState(0);
        const [phase, setPhase] = useState('Idle');

        const setField = (key, val) => setFields((prev) => ({ ...prev, [key]: val }));
        const onFillFromImage = (vals) => setFields((prev) => ({ ...prev, ...vals }));

        // WebSocket progress handling
        React.useEffect(() => {
          const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
          const ws = new WebSocket(`${proto}://${window.location.host}/ws`);
          ws.onmessage = (ev) => {
            try {
              const data = JSON.parse(ev.data);
              if (typeof data.progress === 'number') {
                setProgress(data.progress);
                // Phase heuristic based on backend progress buckets
                if (data.progress < 10) setPhase('Idle');
                else if (data.progress < 30) setPhase('Answering');
                else if (data.progress < 70) setPhase('Answering');
                else if (data.progress < 80) setPhase('Explaining');
                else setPhase('Done');
              }
              if (data.reset) {
                setAnswer('');
                setExplanation('');
                setProgress(0);
                setPhase('Idle');
              }
            } catch (_) {}
          };
          return () => ws.close();
        }, []);

        const handleSubmit = async () => {
          setLoading(true);
          setAnswer('');
          setExplanation('');
          setPhase('Answering');
          try {
            const res = await fetch('/reterieve_answer', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                question: fields.question,
                option1: fields.option1,
                option2: fields.option2,
                option3: fields.option3,
                option4: fields.option4,
              }),
            });
            const data = await res.json();
            const asString = typeof data === 'string' ? data : (data?.answer || JSON.stringify(data));
            setAnswer(asString);

            setPhase('Explaining');
            const resExp = await fetch('/retrieve_explanation', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ...fields, answer: asString }),
            });
            const exp = await resExp.json();
            const expString = typeof exp === 'string' ? exp : JSON.stringify(exp);
            setExplanation(expString);
            setPhase('Done');
          } catch (err) {
            console.error('Submit error:', err);
            alert('There was an error. Check the backend logs.');
            setPhase('Idle');
          } finally {
            setLoading(false);
          }
        };

        return (
          <div className="page">
            <div>
              <QuizForm
                onSubmit={handleSubmit}
                loading={loading}
                answer={answer}
                explanation={explanation}
                fields={fields}
                setField={setField}
              />
              <Progress progress={progress} phase={phase} />
            </div>
            <div>
              <ImageTextExtractor onFillFromImage={onFillFromImage} />
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
